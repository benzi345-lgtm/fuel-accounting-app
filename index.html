<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชีน้ำมัน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-page" style="display:none">
        <div class="login-card">
            <div class="login-header">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 16V8"/><path d="M11 16V4"/><path d="M15 16v-5"/><path d="M19 16v-3"/></svg>
                <h1>ระบบบัญชีน้ำมัน</h1>
                <p>เข้าสู่ระบบเพื่อใช้งาน</p>
            </div>
            <div class="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')handleLogin()">
                </div>
                <div id="loginError" style="color:#e53e3e;font-size:13px;min-height:20px"></div>
                <button id="loginBtn" class="btn btn-primary" style="width:100%;padding:12px" onclick="handleLogin()">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <!-- App -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>ระบบบัญชีน้ำมัน</h2>
            <button class="sidebar-toggle" id="sidebarClose">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>
        <ul class="nav-menu">
            <li><a href="#" data-page="dashboard" class="nav-link active">
                <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V11"/><path d="M12 17V7"/><path d="M15 17V13"/></svg></span>
                <span>แดชบอร์ด</span>
            </a></li>
            <li><a href="#" data-page="compare" class="nav-link">
                <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 16V8"/><path d="M11 16V4"/><path d="M15 16v-5"/><path d="M19 16v-3"/></svg></span>
                <span>เปรียบเทียบสาขา</span>
            </a></li>
            <li><a href="#" data-page="daily-entry" class="nav-link">
                <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838.838-2.872a2 2 0 0 1 .506-.855z"/></svg></span>
                <span>บันทึกประจำวัน</span>
            </a></li>
            <li><a href="#" data-page="history" class="nav-link">
                <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg></span>
                <span>ประวัติรายการ</span>
            </a></li>
            <li><a href="#" data-page="reference" class="nav-link">
                <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2z"/></svg></span>
                <span>ข้อมูลอ้างอิง</span>
            </a></li>
            <li><a href="#" data-page="credit-summary" class="nav-link">
                <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                <span>ลูกหนี้เงินเชื่อ</span>
            </a></li>
            <li><a href="#" data-page="tax-reports" class="nav-link">
                <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg></span>
                <span>รายงานภาษี</span>
            </a></li>
            <li><a href="#" data-page="user-management" class="nav-link">
                <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg></span>
                <span>จัดการผู้ใช้</span>
            </a></li>
        </ul>
    </nav>

    <div class="main-content">
        <header class="topbar">
            <button class="sidebar-toggle" id="sidebarOpen">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
            </button>
            <h1 id="pageTitle">แดชบอร์ด</h1>
            <div class="topbar-right">
                <span id="currentDate"></span>
                <div class="user-info">
                    <span id="userDisplayName"></span>
                    <span id="userRole" class="role-badge"></span>
                    <button onclick="handleLogout()" class="btn-logout">ออกจากระบบ</button>
                </div>
            </div>
        </header>

        <div class="page-content" id="pageContent">
            <!-- Dynamic content renders here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="customers-data.js"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
